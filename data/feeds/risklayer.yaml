id: risklayer
name: "RiskLayer"
homepage: "https://www.risklayer.io"
tagline: "Asset-Level Intelligence"
maintainer: "not on page"
license: "not on page"
access: "not on page (no public dashboard URL surfaced; site is single-page landing)"
update_cadence: "not on page"
status: "experimental beta (per user-provided summary; site itself carries this disclaimer)"

about: >
  EigenLayer-secured Risk Oracle AVS. Staked validators score protocols and
  emit attested risk scores via a "Proof of Risk" consensus mechanism. Per the
  RFP, the feed is positioned as economic-security middleware — risk-as-an-
  oracle rather than risk-as-a-dashboard. Public site does not yet expose the
  attested score format, the validator set, or the scoring dimensions.

risks_covered:
  - protocol-level risk scoring (validator-attested, dimensions not published)
  # Specific risk vectors not enumerated on the public site as of 2026-06-15.

data_model:
  primary_entity: AttestedRiskScore
  identifier: "not on page"

  entities:
    - name: AttestedRiskScore
      description: "Validator-attested risk score for an on-chain object. Structure not published."
      properties:
        - { name: subject,            range: string,  description: "Protocol / asset identifier — format not published" }
        - { name: score,              range: "not on page" }
        - { name: attesting_validators, range: "not on page" }
        - { name: consensus_signature, range: "not on page" }
        - { name: epoch,              range: "not on page" }

    - name: Validator
      description: "EigenLayer-restaked operator scoring protocols. Slashing / staking economics not published."
      properties:
        - { name: operator_address,   range: "not on page" }
        - { name: stake_eth,          range: "not on page" }
        - { name: slashing_conditions, range: "not on page" }

