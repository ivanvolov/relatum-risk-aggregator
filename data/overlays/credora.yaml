# Credora overlay — human curation layer.
# See data/overlays/README.md for format.
#
# Two Credora surfaces:
#   1. reports.credora.io/index.xml — public PDF archive, 4 protocols only
#      (listadao, lotus, spark, steth). The adapter consumes this.
#   2. app.credora.network — gated portal (Credora by RedStone) with per-asset
#      ratings. IVa logged in 2026-06-22 and confirmed: of our 10 candidate
#      protocols (aave, ethena, morpho, compound, etherfi, euler, liquity,
#      rocketpool, sky, yearn), ONLY USDS-Sky exists as a rated asset.
#
# Sky now bumps to covered via the portal page. The other 9 candidates + 11
# categorical no's all flip to verified_absent.

