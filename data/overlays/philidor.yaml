# Philidor overlay — human curation layer.
# See data/overlays/README.md for format.
#
# Philidor has no public API (vault scoring is computed client-side from Morpho
# GraphQL). The only public signal is the protocol-icon list on the analytics.philidor.io
# landing page: {morpho, aave, spark, nest, compound, uniswap, maker, yearn, beefy}.
#
# - morpho, yearn, morpho-vaults are credited as canonical Philidor coverage (already covered).
# - aave, spark, compound, uniswap, sky (via maker) appear as landing-page icons but
#   without Philidor vault scoring. Marked partial — Philidor "touches" them by
#   listing them as protocols they cover the vaults of, but doesn't publish scoring.
# - The remaining 15 don't appear on the landing page at all → verified absent.

