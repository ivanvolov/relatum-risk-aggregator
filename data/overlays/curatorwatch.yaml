# CuratorWatch overlay — human curation layer.
# See data/overlays/README.md for format.
#
# Universe (from /api/vaults, 355 vaults): vault.protocol field maps to morpho(142),
# unknown(134, Turtle vaults), spark(12), euler(6), sky(5), lido(5), plus curator-native
# strategies. Of our 23, the adapter covers 5 lending-rail underlyings (morpho, spark,
# sky, lido, euler).
#
# Partial rows below are protocols whose ASSET shows up in CuratorWatch-tracked vaults
# even though the protocol itself isn't on the rail list. Counts pulled from
# /api/vaults asset.symbol scan on 2026-06-22.

partial:
  - protocol: etherfi
    why: weETH appears as the deposit asset in 6 CuratorWatch-tracked vaults (SparkLend weETH, AlphaGrowth Unichain/Base, Re7 Labs WETH Cluster, K3 Capital Prime, Katana weETH).
    url: https://curatorwatch.com/
    inline: "6 vaults hold weETH"
    claims:
      - { dim: vault-count,  value: "6",       scale: "vaults with weETH" }
      - { dim: vault,        value: "SparkLend weETH",          scale: "curator: Spark Protocol" }
      - { dim: vault,        value: "AlphaGrowth Unichain Market", scale: "curator: AlphaGrowth" }
      - { dim: vault,        value: "AlphaGrowth Base",         scale: "curator: AlphaGrowth" }
      - { dim: vault,        value: "Re7 Labs WETH Cluster",    scale: "curator: Re7 Labs" }
      - { dim: vault,        value: "K3 Capital Prime Market",  scale: "curator: K3 Capital" }
      - { dim: vault,        value: "Katana weETH",             scale: "curator: Katana" }
    date: 2026-06-22
    by: IVa

  - protocol: ethena
    why: USDe / sUSDe appears as the deposit asset in 2 CuratorWatch-tracked vaults (K3 Capital Yield Market, Sentora RLUSD).
    url: https://curatorwatch.com/
    inline: "2 vaults hold USDe/sUSDe"
    claims:
      - { dim: vault-count,  value: "2",       scale: "vaults with USDe family" }
      - { dim: vault,        value: "K3 Capital Yield Market",  scale: "asset USDe · curator K3 Capital" }
      - { dim: vault,        value: "Sentora RLUSD",            scale: "asset sUSDe · curator Sentora" }
    date: 2026-06-22
    by: IVa

  - protocol: pendle
    why: Pendle PT tokens (PT-thBILL, PT-sUSDai, PT-USDai, PT-cUSD) appear as deposit assets in 5 CuratorWatch-tracked K3 Capital vaults.
    url: https://curatorwatch.com/
    inline: "5 vaults hold PT tokens"
    claims:
      - { dim: vault-count,  value: "5",       scale: "vaults with Pendle PT tokens" }
      - { dim: vault,        value: "K3 Capital Theo Market",   scale: "asset PT-thBILL-18JUN2026" }
      - { dim: vault,        value: "K3 Capital USDai Cluster", scale: "asset PT-sUSDai-18JUN2026 / 15OCT2026 / PT-USDai-15OCT2026" }
      - { dim: vault,        value: "K3 Capital Yield Market",  scale: "asset PT-cUSD-23JUL2026" }
    date: 2026-06-22
    by: IVa

  - protocol: rocketpool
    why: rETH appears as the deposit asset in 1 CuratorWatch-tracked vault (SparkLend rETH).
    url: https://curatorwatch.com/
    inline: "1 vault holds rETH"
    claims:
      - { dim: vault-count,  value: "1",       scale: "vaults with rETH" }
      - { dim: vault,        value: "SparkLend rETH",           scale: "curator: Spark Protocol" }
    date: 2026-06-22
    by: IVa

