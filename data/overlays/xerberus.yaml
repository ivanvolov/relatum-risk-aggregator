# Xerberus overlay — human curation layer.
# See data/overlays/README.md for format.
#
# Universe: Xerberus dendrogram has 42 protocols plus separate asset/pool/organisation
# subgraphs. The adapter covers 11 protocols whose Protocol-level entry matches one of
# our 23.
#
# Partial rows below are protocols whose ASSETS show up scored in Xerberus's asset
# subgraph (composite_score visible) even though the protocol itself isn't in the
# Protocol-level dendrogram. Confirmed via app.xerberus.io/api/dendrogram on 2026-06-22.

